server:
  host: "127.0.0.1"
  port: 8765
  mcp_endpoint: "/mcp"
  health_endpoint: "/health"
  sse_endpoint: "/sse"

runtime:
  analysis_python: "C:/ProgramData/miniconda3/envs/seuratv5-course-py/python.exe"
  python_env_name: "seuratv5-course-py"
  rscript: "E:/R-4.4.2/bin/Rscript.exe"

workspace:
  skill_runtime_dir: "skill_runtime"
  inputs_dir: "workspace/inputs"
  outputs_dir: "workspace/outputs"
  logs_dir: "workspace/logs"

security:
  allow_shell_commands: false
  allow_paths_outside_workspace_inputs: false
  allow_outputs_outside_workspace_outputs: false
  allow_patient_private_data: false
  max_demo_rows: 50
  synthetic_demo_requires_confirmation: true

tools:
  - ping
  - list_available_pipelines
  - create_project
  - list_result_files
  - read_report
  - get_job_status
  - read_job_log
  - list_geo_supplementary_files
  - start_geo_download
  - start_extract_workspace_archive
  - list_skill_runtime_files
  - read_skill_runtime_file
  - check_runtime_environment
  - render_workflow_scripts
  - start_scanpy_basic
  - start_seurat_basic
  - propose_downstream_modules
  - validate_result_bundle
  - start_cellchat
  - start_monocle3
  - list_workspace_files
  - read_workspace_file
  - write_workspace_file
  - download_to_workspace
  - run_workspace_python

synthetic_test_tools:
  - run_demo_pipeline
  - run_full_workflow_selftest

workflow:
  real_geo_download_first:
    order:
      - list_geo_supplementary_files
      - start_geo_download
      - get_job_status_until_finished
      - start_extract_workspace_archive_if_needed
      - get_job_status_until_finished
      - inspect_downloaded_files
      - start_seurat_basic_or_start_scanpy_basic
      - get_job_status_until_finished
  seurat_full:
    order:
      - render_workflow_scripts
      - start_seurat_basic
      - get_job_status_until_finished
      - validate_result_bundle
      - propose_downstream_modules
      - user_approval_required
      - start_cellchat
      - start_monocle3
    approval_tokens:
      cellchat: "APPROVED_CELLCHAT"
      monocle3: "APPROVED_MONOCLE3"
